<!doctype html>
<html>
  <head>
    <title>Products</title>
    <link rel="icon" type="image/png" sizes="32x32" href="store.png?v=1">
    <link rel="icon" type="image/png" sizes="16x16" href="store.png?v=1">
    <link rel="shortcut icon" href="store.png?v=1">
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
    <link rel="stylesheet" href="styles.css" id="pageStyle" />
  </head>
  <body>
    <script>
      // Load saved theme immediately
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.getElementById('pageStyle').setAttribute('href', savedTheme);
        }
      })();
    </script>
    <div class="header">
      <div class="header-top">
        <div class="header-brand">
          <h1><a href="index.html"><img src="store.png" alt="Store" style="height: 40px; vertical-align: middle; margin-right: 10px;">Store</a></h1>
        </div>
        
        <div class="header-search">
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Search products..." 
            onkeyup="filterProducts(this.value)"
          />
          <span class="material-symbols-outlined" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #666; pointer-events: none;">search</span>
        </div>
        
        <div class="header-actions">
          <div class="coin-badge">
            <span id="userCoins">0</span> Coins
          </div>
          <button class="theme-toggle" onclick="swapStyleSheet()">Girl theme</button>
          <button onclick="logout()">Logout</button>
        </div>
      </div>
      
      <div class="header-nav">
        <a href="index.html">Home</a>
        <a href="game.html">Snake Game</a>
        <a href="tap-game.html">Tap Game</a>
        <a href="cart.html">Cart</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="orders.html">Orders</a>
        <a href="seller-login.html">Seller</a>
      </div>
      
      <div>
        <h2 id="welcome" align="center"></h2>
      </div>
    </div>

    <div style="max-width: 1400px; margin: 20px auto; padding: 0 20px;">
      <div style="background: #11998e; color: white; padding: 20px 30px; border: 2px solid #0d7a6f; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
        <div>
          <h2 style="margin: 0 0 5px 0; font-size: 24px;">Tax-Free Shopping</h2>
          <p style="margin: 0; font-size: 16px;">Get 18% GST waived on all orders above Rs.200</p>
        </div>
        <div style="background: rgba(255,255,255,0.2); padding: 15px 25px; border: 1px solid white; text-align: center;">
          <div style="font-size: 32px; font-weight: bold;">Rs.200+</div>
          <div style="font-size: 14px;">No Tax Applied</div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="sidebar">
        <h3>Categories</h3>
        <ul id="categories">
          <li class="active" onclick="filterByCategory('all')">All Products</li>
        </ul>
      </div>

      <div class="main-content">
        <div class="products" id="products"></div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="toast.js"></script>
    <script src="script.js"></script>
  </body>
</html>
